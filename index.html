<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Choose a Codex pet from Petdex." />
    <title>Petdex</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="petdex-shell" aria-label="Petdex">
      <aside class="source-pane" aria-label="Pets">
        <div class="search-wrap">
          <input
            id="search"
            type="search"
            autocomplete="off"
            spellcheck="false"
            placeholder="Search"
            aria-label="Search pets"
          />
        </div>

        <p id="status" class="status-line" role="status">Loading Petdex...</p>

        <div id="pet-list" class="pet-list" role="listbox" aria-label="Available pets"></div>
      </aside>

      <section class="detail-pane" aria-label="Selected pet">
        <div class="preview-region">
          <div id="sprite-preview" class="sprite-preview" aria-live="polite"></div>
        </div>

        <footer class="detail-footer">
          <div class="pet-copy">
            <p id="source-label" class="source-label">Petdex</p>
            <h1 id="pet-name">Petdex</h1>
            <p id="pet-description">Choose a pet to preview it.</p>
            <p id="pi-extension-status" class="pi-extension-status">Pi extension status unavailable</p>
          </div>
          <div class="action-row" aria-label="Actions">
            <button id="install-pi-action" class="secondary-action" type="button" disabled>
              Install to Pi
            </button>
            <button id="uninstall-pi-action" class="secondary-action" type="button" hidden disabled>
              Uninstall Pi
            </button>
            <button id="primary-action" type="button" disabled>Use</button>
          </div>
        </footer>
      </section>
    </main>

    <template id="pet-row-template">
      <button class="pet-row" type="button" role="option">
        <span class="pet-row-name"></span>
        <span class="pet-row-meta"></span>
      </button>
    </template>

    <script defer src="app.js"></script>
  </body>
</html>
